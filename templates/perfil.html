<!DOCTYPE html>
<html lang="pt-br">
  <head>    
    <title></title>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100;200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      html, body {
        height: 100%;
        margin: 0;
      }
      .dashboard{
        background-image: url("{{ url_for('static', filename='img/dash.png') }}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        height: 16vh;
      }
      .toast {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%) translateY(10px);
        
        background: #ff3b3b;
        color: white;
        padding: 12px 18px;
        border-radius: 10px;
        font-family: Arial;

        opacity: 0;
        transition: 0.3s;

        max-width: 320px;
        width: fit-content;
        text-align: center;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
    <script>
      function mostrarToast(mensagem) {
        const toast = document.getElementById("toast");
        toast.innerText = mensagem;
        toast.classList.add("show");

        setTimeout(() => {
            toast.classList.remove("show");
        }, 3000);
      }
      window.onload = () => {
        const toast = document.getElementById("toast");
        if (toast && toast.innerText.trim() !== "") {
          toast.classList.add("show");
          setTimeout(() => toast.classList.remove("show"), 3000);
          }
        };
    </script>
  </head>
  <body class="font-[Sora]">
    <div class="dashboard fixed top-0 left-0 w-full z-50 grid grid-cols-2 items-center h-20 px-5">
      <div class="flex items-center">
        <img class="size-[8vh]" src="{{ url_for('static', filename='img/logo.png') }}" alt="">
      </div>
      <div class="flex justify-end items-center gap-10 h-full">
        <a href="{{ url_for('pesquisa') }}" class="flex items-center justify-center">
          <button class="group relative w-[4vh] h-[4vh] cursor-pointer">
            <img class="absolute inset-0 w-full h-full group-hover:opacity-0 transition" src="{{ url_for('static', filename='img/search.png') }}" alt="">
            <img class="absolute inset-0 w-full h-full opacity-0 group-hover:opacity-100 transition" src="{{ url_for('static', filename='img/searchhover.png') }}" alt="">
          </button>
        </a>
        <a href="{{ url_for('entrada') }}" class="flex items-center justify-center">
          <button class="group relative w-[6vh] h-[4vh] cursor-pointer">
            <img class="absolute inset-0 w-full h-full group-hover:opacity-0 transition" src="{{ url_for('static', filename='img/mail.png') }}" alt="">
            <img class="absolute inset-0 w-full h-full opacity-0 group-hover:opacity-100 transition" src="{{ url_for('static', filename='img/mailhover.png') }}" alt="">
          </button>
        </a>
        <button class="group relative w-[5vh] h-[5vh] cursor-pointer" onclick="mostrarToast('Função indisponível')">
          <img class="absolute inset-0 w-full h-full group-hover:opacity-0 transition" src="{{ url_for('static', filename='img/sun.png') }}" alt="">
          <img class="absolute inset-0 w-full h-full opacity-0 group-hover:opacity-100 transition" src="{{ url_for('static', filename='img/sunhover.png') }}" alt="">
        </button>
        <a href="{{ url_for('perfil') }}" class="flex items-center justify-center">
          <button class="group relative w-[8vh] h-[8vh] cursor-pointer">
            <img class="absolute inset-0 w-full h-full group-hover:opacity-0 transition" src="{{ url_for('static', filename='img/perfil.png') }}" alt="">
            <img class="absolute inset-0 w-full h-full opacity-0 group-hover:opacity-100 transition" src="{{ url_for('static', filename='img/perfilhover.png') }}" alt="">
          </button>
        </a>
      </div>
    </div>

    <main class="pt-20">

      <div id="toast" class="toast">{{ msg }}</div>

    </main>
  </body>
</html>
