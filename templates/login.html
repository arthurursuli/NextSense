<!DOCTYPE html>
<html lang="pt-br">
  <head>    
    <title></title>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100;200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      html, body {
        height: 100%;
        margin: 0;
      }
      body{
        background-image: url("{{ url_for('static', filename='img/login.png') }}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
      .toast {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%) translateY(10px);
        
        background: #ff3b3b;
        color: white;
        padding: 12px 18px;
        border-radius: 10px;
        font-family: Arial;

        opacity: 0;
        transition: 0.3s;

        max-width: 320px;
        width: fit-content;
        text-align: center;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
    <script>
      function mostrarToast(mensagem) {
        const toast = document.getElementById("toast");
        toast.innerText = mensagem;
        toast.classList.add("show");

        setTimeout(() => {
            toast.classList.remove("show");
        }, 3000);
      }
      window.onload = () => {
        const toast = document.getElementById("toast");
        if (toast && toast.innerText.trim() !== "") {
          toast.classList.add("show");
          setTimeout(() => toast.classList.remove("show"), 3000);
          }
        };
    </script>
  </head>
  <body class="flex items-center justify-center min-h-screen font-[Sora]">

    <div class="card w-96 bg-base-100 shadow-[0_0_30px_rgba(11,60,129,0.2)]
            hover:shadow-[0_0_60px_rgba(11,60,129,0.4)]
            transition duration-300 grid justify-items-center gap-3 p-5">

      <h2 class="text-[#0B3C81] text-xl font-bold">Login</h2>

      <form class="grid gap-3" action="{{url_for('verificarlogin')}}" method="post">
        <input class="input input-bordered placeholder-[#0B3C81] bg-[#F2EDE3] focus:border-[#0B3C81] focus:outline-none hover:border-[#0B3C81]" type="text" name="usuario" placeholder="Usuário" required>

        <input class="input input-bordered placeholder-[#0B3C81] bg-[#F2EDE3] focus:border-[#0B3C81] focus:outline-none hover:border-[#0B3C81]" type="password" name="senha" placeholder="Senha" required>

        <button type="submit" class="btn text-white bg-[#0B3C81] hover:bg-[#A9C0E3] hover:text-[#0B3C81] hover:border-[#0B3C81]">Entrar</button>
      </form>

      <button class="text-[#0B3C81]" type="button" onclick="mostrarToast('Função indisponível')">Esqueceu sua senha</button>

      <a href="{{ url_for('cadastro') }}">
        <button class="text-[#0B3C81]" type="button">Não possui cadastro</button>
      </a>
  
    </div>

    
    <div id="toast" class="toast">{{ msg }}</div>
  </body>
</html>
